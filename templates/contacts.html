{% extends "base.html" %}
{% block title %}Contacts Page{% endblock title %}
{% block body %}
<div class="container-fluid px-0 mb-3">
<img src="https://cdn-prd.tongkolspace.com/hipwee/wp-content/uploads/2016/10/hipwee-Doraemon.jpg" class= "d-block w-100 mx-0" height="500px" alt="">
</div>
<div class="container mb-3 py-4">
<h1 class="text-center">Contact Us</h1>
<form method="post" action="/contact/" class="w-50 mx-auto">
  {% csrf_token %}
<div class="form-group">
  <label for="exampleFormControlInput1" class="form-label">Name</label>
  <input type="text" class="form-control" id="exampleFormControlInput1" name= "name" placeholder="Enter your name">
</div>
<div class="form-group">
  <label for="exampleFormControlInput1" class="form-label">Email address</label>
  <input type="email" class="form-control" id="exampleFormControlInput1" name= "email" placeholder="Enter your email">
</div>
<div class="form-group">
  <label for="exampleFormControlInput1" class="form-label">Phone Number</label>
  <input type="tel" class="form-control" id="exampleFormControlInput1" name= "phone" placeholder="Enter your phone number">
</div>
<div class="form-group">
  <label for="desc" class="form-label">Tell me what you want to contact me for</label>
  <textarea class="form-control" id="desc" name="desc" rows="3"></textarea>
</div>
<button class= "btn btn-primary my-3" type="submit">Submit</button>
</form>
</div>
{% endblock body %}
